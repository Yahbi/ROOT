name: ROOT CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  ROOT_OLLAMA_ENABLED: "false"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Quality Gate (every push and PR)
  # ---------------------------------------------------------------------------
  quality-gate:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Lint with ruff (if available)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check backend/ tests/ --output-format=github

      - name: Run tests
        run: |
          python -m pytest tests/ -x --tb=short -q \
            --junitxml=test-results/junit-${{ matrix.python-version }}.xml
        env:
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          ROOT_API_KEY: ""

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Stage 2 — Build Verification (main branch only)
  # ---------------------------------------------------------------------------
  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports cleanly
        run: |
          python -c "from backend.main import _fastapi_app; print('FastAPI app import: OK')"

      - name: Verify knowledge bootstrap loads
        run: |
          python -c "from backend.core.knowledge_bootstrap import CORE_KNOWLEDGE; print(f'Knowledge entries: {len(CORE_KNOWLEDGE)}')"

      - name: Verify skills directory
        run: |
          SKILL_COUNT=$(find data/skills/ -name '*.md' -type f | wc -l)
          echo "Skill files found: $SKILL_COUNT"
          if [ "$SKILL_COUNT" -lt 1 ]; then
            echo "::error::No SKILL.md files found in data/skills/"
            exit 1
          fi
