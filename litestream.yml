# Litestream configuration for ROOT SQLite database replication
# Docs: https://litestream.io/reference/config/
#
# Local file-based replicas for now. Migrate to S3/GCS when ready:
#   replicas:
#     - type: s3
#       bucket: root-backups
#       path: memory
#       region: us-east-1
#       retention: 720h

dbs:
  - path: /home/user/ROOT/data/adaptive_config.db
    replicas:
      - type: file
        path: /home/user/ROOT/backups/litestream/adaptive_config
        retention: 720h

  - path: /home/user/ROOT/data/agent_network.db
