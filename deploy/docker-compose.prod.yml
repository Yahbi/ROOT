# ROOT v1.0.0 — Production Docker Compose
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d
#   docker compose -f deploy/docker-compose.prod.yml logs -f root
#
# Volumes:
#   - root-data: persists SQLite databases across container restarts
#   - root-backups: litestream WAL replicas + daily backup snapshots
#   - redis-data: future caching layer persistence

services:
  # ─── ROOT Application ───────────────────────────────────────────────────────
  root:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: root-app
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - ROOT_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - root-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - root-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Litestream Sidecar (continuous SQLite replication) ──────────────────────
  # NOTE: Litestream needs paths matching litestream.yml. We mount the host
  # data/ and backups/ directories at the same absolute paths the config uses.
  # If running on a different host, update litestream.yml paths accordingly.
  litestream:
    image: litestream/litestream:latest
    container_name: root-litestream
    restart: unless-stopped
    entrypoint: ["litestream", "replicate", "-config", "/etc/litestream.yml"]
    volumes:
      - root-data:/home/user/ROOT/data:ro
      - root-backups:/home/user/ROOT/backups
      - ../litestream.yml:/etc/litestream.yml:ro
    depends_on:
      root:
        condition: service_healthy
    healthcheck:
      # Litestream doesn't have an HTTP endpoint; verify the process is running
      test: ["CMD", "pgrep", "-x", "litestream"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - root-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Redis (future caching layer) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: root-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - root-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  root-data:
    driver: local
  root-backups:
    driver: local
  redis-data:
    driver: local

networks:
  root-net:
    driver: bridge
